name: Build Release (Play Store)

# Gera o .AAB de PRODUÇÃO assinado, pronto para a Google Play Store.
# Roda manualmente pelo botão "Run workflow" na aba Actions.
#
# ANTES DE RODAR, configure os 4 SECRETS do repositório
# (Settings > Secrets and variables > Actions > New repository secret):
#   KEYSTORE_BASE64      -> a keystore (.jks) convertida em base64
#   KEYSTORE_PASSWORD    -> senha da keystore
#   KEY_ALIAS            -> alias da chave (ex: dfnet)
#   KEY_PASSWORD         -> senha da chave (geralmente igual à da keystore)
#
# Como gerar a keystore e o base64 está no GUIA-PLAYSTORE.md

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Build do app web (Vite)
        run: npm run build

      - name: Adicionar plataforma Android (Capacitor)
        run: npx cap add android

      - name: Copiar google-services.json (Firebase)
        run: cp google-services.json android/app/google-services.json

      - name: Adicionar permissão de notificação (Android 13+)
        run: |
          sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />#' android/app/src/main/AndroidManifest.xml

      - name: Aplicar ícone da DFNET (logo)
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$d
            cp app-icons/ic_launcher_$d.png            android/app/src/main/res/mipmap-$d/ic_launcher.png
            cp app-icons/ic_launcher_round_$d.png      android/app/src/main/res/mipmap-$d/ic_launcher_round.png
            cp app-icons/ic_launcher_foreground_$d.png android/app/src/main/res/mipmap-$d/ic_launcher_foreground.png
          done
          mkdir -p android/app/src/main/res/values
          cp app-icons/ic_launcher_background.xml android/app/src/main/res/values/ic_launcher_background.xml
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cp app-icons/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp app-icons/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          rm -f android/app/src/main/res/drawable*/ic_launcher_foreground.xml || true

      - name: Sincronizar build com o Android
        run: npx cap sync android

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Recriar a keystore a partir do secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/dfnet-release.jks

      - name: Gerar AAB assinado (release)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=dfnet-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Gerar APK assinado (release) — opcional, para testes
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=dfnet-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Publicar o AAB (para a Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: dfnet-app-aab-playstore
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Publicar o APK assinado (para teste direto)
        uses: actions/upload-artifact@v4
        with:
          name: dfnet-app-apk-release
          path: android/app/build/outputs/apk/release/app-release.apk
